<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lost and Found Management System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Lost and Found Management System</h1>
            <p>Report lost items or found items, and search for matches</p>
        </header>

        <main>
            <!-- Add New Item Section -->
            <section class="section">
                <h2>Add New Item</h2>
                <form id="itemForm" enctype="multipart/form-data">
                    <div class="form-group">
                        <label for="type">Type:</label>
                        <select id="type" name="type" required>
                            <option value="">Select Type</option>
                            <option value="lost">Lost Item</option>
                            <option value="found">Found Item</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="category">Category:</label>
                        <input type="text" id="category" name="category" placeholder="e.g., Phone, Wallet, Keys, Bag" required>
                    </div>

                    <div class="form-group">
                        <label for="location">Location:</label>
                        <input type="text" id="location" name="location" placeholder="e.g., Library, Cafeteria, Parking Lot" required>
                    </div>

                    <div class="form-group">
                        <label for="description">Description:</label>
                        <textarea id="description" name="description" placeholder="Describe the item in detail" rows="3"></textarea>
                    </div>

                    <div class="form-group">
                        <label for="contact">Contact Info:</label>
                        <input type="text" id="contact" name="contact" placeholder="Your email or phone number">
                    </div>

                    <div class="form-group">
                        <label for="image">Image (optional):</label>
                        <input type="file" id="image" name="image" accept="image/*">
                    </div>

                    <button type="submit">Add Item</button>
                </form>
            </section>

            <!-- Search and Query Section -->
            <section class="section">
                <h2>Search & Queries</h2>
                
                <div class="query-group">
                    <h3>Search by Location</h3>
                    <div class="search-form">
                        <input type="text" id="searchLocation" placeholder="Enter location to search">
                        <button onclick="searchByLocation()">Search</button>
                    </div>
                    <div id="locationResults" class="results"></div>
                </div>

                <div class="query-group">
                    <h3>Recent Items (Last 7 Days)</h3>
                    <button onclick="getRecentItems()">Get Recent Items</button>
                    <div id="recentResults" class="results"></div>
                </div>

                <div class="query-group">
                    <h3>Match Items by Category</h3>
                    <div class="search-form">
                        <input type="text" id="matchCategory" placeholder="Enter category to match">
                        <button onclick="matchItems()">Find Matches</button>
                    </div>
                    <div id="matchResults" class="results"></div>
                </div>

                <div class="query-group">
                    <h3>All Items</h3>
                    <button onclick="getAllItems()">Get All Items</button>
                    <div id="allResults" class="results"></div>
                </div>
            </section>
        </main>

        <footer>
            <p>&copy; 2024 Lost and Found Management System</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
